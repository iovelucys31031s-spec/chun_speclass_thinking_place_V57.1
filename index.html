    <script id="gas-backend-code" type="text/plain">
function doPost(e) {
  var lock = LockService.getScriptLock();
  lock.waitLock(15000);
  try {
    var doc = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = doc.getSheets()[0];
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(["最後更新時間", "資料類型(boards/responses/settings)", "資料專屬ID", "完整內容(JSON)"]);
    }
    var payload = JSON.parse(e.postData.contents);
    var timestamp = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
    var dataRange = sheet.getDataRange(); 
    var values = dataRange.getValues(); 
    var rowIndex = -1;
    for (var i = 1; i < values.length; i++) { 
      if (values[i][1] === payload.type && values[i][2] === payload.id) { rowIndex = i + 1; break; } 
    }
    if (payload.action === 'delete') { 
      if (rowIndex !== -1) sheet.deleteRow(rowIndex); 
    } else { 
      var jsonStr = typeof payload.data === 'string' ? payload.data : JSON.stringify(payload.data); 
      if (rowIndex !== -1) { 
        sheet.getRange(rowIndex, 1, 1, 4).setValues([[timestamp, payload.type, payload.id, jsonStr]]); 
      } else { 
        sheet.appendRow([timestamp, payload.type, payload.id, jsonStr]); 
      } 
    }
    SpreadsheetApp.flush(); // 強制立刻寫入，避免快取延遲
    return ContentService.createTextOutput(JSON.stringify({"status": "success", "id": payload.id})).setMimeType(ContentService.MimeType.JSON);
  } catch(ex) { 
    return ContentService.createTextOutput(JSON.stringify({"status": "error", "message": ex.message})).setMimeType(ContentService.MimeType.JSON); 
  } finally { lock.releaseLock(); }
}
function doGet(e) {
  var doc = SpreadsheetApp.getActiveSpreadsheet(); 
  var sheet = doc.getSheets()[0];
  var result = { boards: [], responses: [], tutorialText: null, settings: {} };
  if (sheet.getLastRow() === 0) return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
  var values = sheet.getDataRange().getValues();
  for (var i = 1; i < values.length; i++) {
    var type = values[i][1]; var id = values[i][2]; var jsonStr = values[i][3];
    if (!jsonStr) continue;
    if (type === 'boards') { try { result.boards.push(JSON.parse(jsonStr)); } catch(err){} } 
    else if (type === 'responses') { try { result.responses.push(JSON.parse(jsonStr)); } catch(err){} } 
    else if (type === 'settings') { 
      if (id === 'tutorial') result.tutorialText = jsonStr; 
      result.settings[id] = jsonStr; 
    }
  }
  return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
}

                for (l of text) {
                    if ('"' === l) { if (s && l === p) row[i] += l; s = !s; } 
                    else if (',' === l && s) l = row[++i] = '';
                    else if ('\n' === l && s) { if ('\r' === p) row[i] = row[i].slice(0, -1); row = ret[++r] = [l = '']; i = 0; }

                    const reader = new FileReader();

                    reader.onload = event => {
                        const img = new Image();

                        img.onload = () => {

                            canvas.width = width; canvas.height = height;

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled=false, type="button", title="" }) => {
            const baseStyle = "flex items-center justify-center px-4 py-2 rounded-xl font-bold transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm";
            const variants = { primary: "bg-serenity text-white hover:bg-blue-500", secondary: "bg-quartz text-gray-800 hover:bg-pink-300", outline: "border-2 border-serenity text-serenity hover:bg-serenity hover:text-white", danger: "bg-red-400 text-white hover:bg-red-500" };
            return <button type={type} onClick={onClick} disabled={disabled} title={title} className={`${baseStyle} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const Card = ({ children, className = '', id }) => <div id={id} className={`bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg p-6 ${className}`}>{children}</div>;

        const FieldSection = ({ field, value, onChange, apiKey, showAlert }) => {
            const [isRecording, setIsRecording] = useState(false);
            const isRecordingRef = useRef(false);
            const [loading, setLoading] = useState(false);
            const [loadingType, setLoadingType] = useState(''); 
            const recognitionRef = useRef(null); 
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            const valueRef = useRef(value); const onChangeRef = useRef(onChange);
            
            // Normalize value for new choice structure if missing
            if (value.choices === undefined) value.choices = [];
            if (value.otherText === undefined) value.otherText = '';

            const isChoice = field.type === 'radio' || field.type === 'checkbox';
            
            useEffect(() => { valueRef.current = value; onChangeRef.current = onChange; }, [value, onChange]);
            useEffect(() => { isRecordingRef.current = isRecording; }, [isRecording]);

            useEffect(() => {
                if (isChoice) return; // Do not initialize speech recognition for choice fields
                
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true; 
                    recognition.interimResults = true; 
                    recognition.lang = 'zh-TW';
                    
                    recognition.onresult = (event) => {
                        let finalTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) { 
                            if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript; 
                        }
                        if (finalTranscript) {
                            const currentVal = valueRef.current; 
                            const newVal = currentVal.level1 + finalTranscript;
                            onChangeRef.current({ ...currentVal, level1: newVal, level3: newVal });
                        }
                    };
                    
                    recognition.onerror = (e) => { 
                        console.warn("語音辨識發生錯誤或暫停:", e.error); 
                    };
                    
                    recognition.onend = () => {
                        if (isRecordingRef.current) {
                            try { recognitionRef.current.start(); } catch(e){}
                        }
                    };
                    
                    recognitionRef.current = recognition;
                }
            }, [isChoice]);

            const stopAllRecording = () => {
                setIsRecording(false);
                isRecordingRef.current = false;
                
                if (recognitionRef.current) { 
                    try { recognitionRef.current.stop(); } catch(e){} 
                }
                
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                    mediaRecorderRef.current.stop();
                    mediaRecorderRef.current.stream.getTracks().forEach(t => t.stop());
                }
            };

            const toggleRecording = async () => {
                if (isRecording) {
                    stopAllRecording();
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        const mediaRecorder = new MediaRecorder(stream);
                        mediaRecorderRef.current = mediaRecorder;
                        audioChunksRef.current = [];
                        
                        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunksRef.current.push(e.data); };
                        mediaRecorder.onstop = () => {
                            const options = mediaRecorderRef.current.mimeType ? { type: mediaRecorderRef.current.mimeType } : {};
                            const blob = new Blob(audioChunksRef.current, options);
                            const reader = new FileReader();
                            reader.readAsDataURL(blob);
                            reader.onloadend = () => {
                                onChangeRef.current({ ...valueRef.current, audioUrl: reader.result });
                            };
                        };

                        if (recognitionRef.current) { 
                            try { recognitionRef.current.start(); } catch(e){} 
                        }
                        mediaRecorder.start(200);
                        
                        setIsRecording(true);
                        isRecordingRef.current = true;
                    } catch (err) {
                        showAlert("無法存取麥克風，請檢查瀏覽器權限設定。\n(" + err.message + ")");
                    }
                }
            };

            const handleTextChange = (e, level) => {
                const currentVal = valueRef.current; let updated = { ...currentVal, [level]: e.target.value };
                if (level === 'level1' && currentVal.stage === 'raw') updated.level3 = e.target.value;
                onChange(updated);
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setLoading(true); setLoadingType('image');
                try {
                    const compressedBase64 = await compressImage(file);
                    onChangeRef.current({ ...valueRef.current, imageUrl: compressedBase64 });
                } catch (err) { showAlert("圖片上傳失敗：" + err.message); } 
                finally { setLoading(false); setLoadingType(''); e.target.value = ''; }
            };

            const handleSummary = async () => {
                if (!apiKey?.trim()) return showAlert("老師尚未設定 AI 金鑰，無法使用魔法摘要。");
                if (!value.level1.trim()) return showAlert("請先輸入內容喔！");
                setLoading(true); setLoadingType('summary');
                try {
                    const summary = await getSummary(value.level1, apiKey);
                    onChange({ ...value, level2: summary, level3: summary, stage: 'summary' });
                } catch (e) { showAlert("魔法摘要失敗：" + e.message); }
                setLoading(false); setLoadingType('');
            };

            const handleBullets = async () => {
                if (!apiKey?.trim()) return showAlert("老師尚未設定 AI 金鑰，無法使用重點條列。");
                if (!value.level2.trim() && !value.level1.trim()) return showAlert("沒有內容可以轉條列！");
                setLoading(true); setLoadingType('bullet');
                try {
                    const bullets = await getBullets(value.level2 || value.level1, apiKey);
                    onChange({ ...value, level2: bullets, level3: bullets, stage: 'bullet' });
                } catch (e) { showAlert("重點條列失敗：" + e.message); }
                setLoading(false); setLoadingType('');
            };

            const handleChoiceChange = (opt, isChecked, isRadio) => {
                let newChoices = [...(value.choices || [])];
                if (isRadio) {
                    newChoices = isChecked ? [opt] : [];
                } else {
                    if (isChecked) newChoices.push(opt);
                    else newChoices = newChoices.filter(c => c !== opt);
                }
                updateChoiceValue(newChoices, value.otherText || '');
            };

            const handleOtherTextChange = (e) => {
                const text = e.target.value;
                updateChoiceValue(value.choices || [], text);
            };

            const updateChoiceValue = (newChoices, newOtherText) => {
                const formatted = newChoices.map(c => c === '__OTHER__' ? (newOtherText ? `其他: ${newOtherText}` : '其他') : c);
                const resultText = formatted.join('、 ');
                onChange({ ...value, choices: newChoices, otherText: newOtherText, level1: resultText, level3: resultText });
            };

            return (
                <div className="mb-6 p-4 border-2 border-serenity/30 rounded-xl bg-white shadow-sm">
                    <div className="flex justify-between items-start mb-2">
                        <h3 className="font-bold text-lg text-serenity flex items-center gap-2">
                            <span className="bg-serenity text-white rounded-full min-w-[2rem] px-2 h-8 flex items-center justify-center whitespace-nowrap shadow-sm">{field.id.length > 2 ? field.id.substring(0,2) : field.id}</span>
                            {field.title}
                            <button onClick={() => TTS.speak(field.title)} className="text-gray-400 hover:text-serenity p-1 ml-1" title="單獨朗讀短標題" type="button"><Icons.Speaker /></button>
                        </h3>
                    </div>
                    <div className={`flex justify-between items-start ml-10 ${field.questionImage ? 'mb-2' : 'mb-4'}`}>
                        <p className="text-sm text-gray-600 flex-1 pr-2 whitespace-pre-wrap">{field.guide}</p>
                        <button onClick={() => TTS.speak(field.guide)} className="text-gray-400 hover:text-serenity p-1 shrink-0 bg-gray-50 rounded shadow-sm border border-gray-100" title="單獨朗讀引導說明" type="button"><Icons.Speaker /></button>
                    </div>

                    {field.questionImage && (
                        <div className="ml-10 mb-4 pr-2">
                            <img src={field.questionImage} alt="題目圖示" className="w-full max-h-[45vh] md:max-h-[300px] object-contain rounded-xl shadow-sm border-2 border-serenity/20 bg-gray-50 p-1" />
                        </div>
                    )}

                    <div className="ml-10 space-y-4">
                        {isChoice ? (
                            <div className={`transition-all ${value.stage !== 'raw' ? 'opacity-70 pointer-events-none' : ''}`}>
                                <label className="block text-xs font-bold text-blue-500 mb-2 flex items-center gap-1">
                                    {field.type === 'radio' ? '🔘 單選題' : '☑️ 核取方塊(多選)'}
                                </label>
                                <div className="space-y-3">
                                    {(field.options || '').split(',').map(s => s.trim()).filter(s => s).map(opt => (
                                        <label key={opt} className={`flex flex-col gap-2 cursor-pointer p-3 bg-gray-50 rounded-xl border-2 transition-all hover:bg-gray-100 ${(value.choices || []).includes(opt) ? 'border-serenity bg-blue-50' : 'border-gray-200'}`}>
                                            <div className="flex items-center gap-3">
                                                <input 
                                                    type={field.type} 
                                                    name={`choice_${field.id}`}
                                                    checked={(value.choices || []).includes(opt)}
                                                    onChange={(e) => handleChoiceChange(opt, e.target.checked, field.type === 'radio')}
                                                    className={`w-5 h-5 text-serenity focus:ring-serenity ${field.type === 'radio' ? 'rounded-full' : 'rounded'}`}
                                                />
                                                <span className="font-bold text-gray-800 text-lg">{opt}</span>
                                            </div>
                                            {/* 學生填寫時顯示該選項的圖片 */}
                                            {field.optionImages && field.optionImages[opt] && (
                                                <img src={field.optionImages[opt]} alt={opt} className="mt-1 rounded-lg max-h-40 object-contain w-full bg-white border border-gray-200 p-1" />
                                            )}
                                        </label>
                                    ))}
                                    {field.allowOther && (
                                        <div className={`flex flex-col gap-2 p-3 bg-gray-50 rounded-xl border-2 transition-all ${(value.choices || []).includes('__OTHER__') ? 'border-serenity bg-blue-50' : 'border-gray-200'}`}>
                                            <label className="flex items-center gap-3 cursor-pointer">
                                                <input 
                                                    type={field.type} 
                                                    name={`choice_${field.id}`}
                                                    checked={(value.choices || []).includes('__OTHER__')}
                                                    onChange={(e) => handleChoiceChange('__OTHER__', e.target.checked, field.type === 'radio')}
                                                    className={`w-5 h-5 text-serenity focus:ring-serenity ${field.type === 'radio' ? 'rounded-full' : 'rounded'}`}
                                                />
                                                <span className="font-bold text-gray-800 text-lg">其他</span>
                                            </label>
                                            {(value.choices || []).includes('__OTHER__') && (
                                                <div className="ml-8 mt-1 animate-fadeIn">
                                                    <input 
                                                        type="text" 
                                                        value={value.otherText || ''} 
                                                        onChange={handleOtherTextChange}
                                                        placeholder="請補充說明其他內容..."
                                                        className="w-full p-2.5 border-2 border-gray-300 rounded-lg outline-none focus:border-serenity font-bold text-gray-800 bg-white"
                                                    />
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className={`transition-all ${value.stage !== 'raw' ? 'opacity-70' : ''}`}>
                                <label className="block text-xs font-bold text-blue-500 mb-1 flex items-center gap-1">
                                    {value.stage !== 'raw' ? '原始想法 (已鎖定)' : '📝 綜合輸入區 (文字、圖片、錄音+逐字稿)'}
                                </label>
                                <div className="relative">
                                    <textarea className={`w-full p-3 pb-14 rounded-lg border-2 ${value.stage === 'raw' ? (isRecording ? 'border-red-400 focus:ring-2 focus:ring-red-200' : 'border-serenity focus:ring-2 focus:ring-serenity') : 'border-gray-200 bg-gray-50'} resize-y min-h-[120px] outline-none transition-colors`} placeholder="點擊麥克風說話、上傳照片，或直接在這裡打字..." value={value.level1} onChange={(e) => handleTextChange(e, 'level1')} readOnly={value.stage !== 'raw'} />
                                    {value.stage === 'raw' && (
                                        <div className="absolute bottom-3 right-3 flex gap-2">
                                            <label className={`p-2 rounded-full text-white shadow-md transition-colors cursor-pointer flex items-center justify-center ${loading ? 'bg-gray-400' : 'bg-serenity hover:bg-blue-500'}`} title="上傳照片">
                                                {loading && loadingType === 'image' ? <span className="text-xs px-2 font-bold animate-pulse">處理中</span> : <Icons.Camera />}
                                                <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" disabled={loading} />
                                            </label>
                                            
                                            {isRecording ? (
                                                <button onClick={toggleRecording} className="px-4 py-1.5 rounded-full text-white shadow-md bg-red-500 animate-pulse font-bold text-sm flex items-center gap-1 hover:bg-red-600 transition-colors" title="停止錄音" type="button">
                                                    <span className="w-2 h-2 bg-white rounded-full"></span> 停止錄音
                                                </button>
                                            ) : (
                                                <button onClick={toggleRecording} className="p-2 rounded-full text-white shadow-md transition-colors bg-serenity hover:bg-blue-500" title="開始錄音" disabled={loading} type="button">
                                                    <Icons.Mic />
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                                
                                {value.audioUrl && (
                                    <div className="mt-3 bg-gray-50 p-3 rounded-lg border border-gray-200 shadow-sm flex items-center justify-between gap-3">
                                        <audio src={value.audioUrl} controls className="h-10 flex-1 min-w-0" />
                                        {value.stage === 'raw' && <button onClick={() => onChange({ ...value, audioUrl: null })} className="text-xs text-red-500 hover:bg-red-50 px-2 py-1 rounded border border-red-200 font-bold whitespace-nowrap" type="button">刪除音檔</button>}
                                    </div>
                                )}

                                {value.imageUrl && (
                                    <div className="mt-3 relative inline-block">
                                        <img src={value.imageUrl} alt="上傳的圖片" className="max-h-60 rounded-lg shadow-sm border border-gray-200" />
                                        {value.stage === 'raw' && <button onClick={() => onChange({ ...value, imageUrl: null })} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-lg hover:bg-red-600 font-bold" title="移除照片" type="button">X</button>}
                                    </div>
                                )}
                            </div>
                        )}

                        {!isChoice && value.stage === 'raw' && value.level1.trim().length > 0 && (
                            <div className="flex gap-2 justify-end mt-2">
                                <Button onClick={handleSummary} variant={apiKey?.trim() ? "secondary" : "outline"} className={`text-sm py-1 min-w-[120px] ${!apiKey?.trim() ? 'opacity-50 cursor-not-allowed border-gray-300 text-gray-400' : ''}`} disabled={loading || !apiKey?.trim()} title={!apiKey?.trim() ? "老師尚未開放 AI 功能" : ""}>
                                    {loading && loadingType === 'summary' ? <span className="animate-pulse">✨ AI 處理中...</span> : <><Icons.Magic /> 🌟 魔法摘要 {!apiKey?.trim() && '(未開放)'}</>}
                                </Button>
                            </div>
                        )}

                        {!isChoice && value.stage !== 'raw' && (
                            <div className="mt-4 p-4 bg-pink-50 border-2 border-quartz rounded-lg relative animate-fadeIn shadow-inner">
                                <div className="absolute -top-3 left-4 bg-quartz px-3 py-0.5 text-xs font-bold rounded-full text-gray-700 shadow-sm border border-pink-300">
                                    {value.stage === 'summary' ? '✨ AI 魔法摘要 (請手動校對)' : '🎯 AI 重點條列 (請手動校對)'}
                                </div>
                                <p className="text-xs text-gray-500 mb-2 mt-2 font-bold">💡 這是 AI 幫你整理的內容，可以直接在這裡修改成你真正想說的話喔！</p>
                                <textarea className="w-full p-3 rounded-lg border-2 border-quartz focus:ring-2 focus:ring-pink-400 outline-none resize-y min-h-[100px] bg-white text-gray-800" value={value.level3} onChange={(e) => handleTextChange(e, 'level3')} />
                                <div className="flex gap-2 justify-end mt-3">
                                    <Button onClick={() => onChange({ ...value, stage: 'raw', level3: value.level1 })} variant="outline" className="text-xs py-1 px-3 border-gray-400 text-gray-500 hover:bg-gray-100 bg-white">重來</Button>
                                    {value.stage === 'summary' && (
                                        <Button onClick={handleBullets} variant={apiKey?.trim() ? "secondary" : "outline"} className={`text-xs py-1 px-3 min-w-[120px] ${!apiKey?.trim() ? 'opacity-50 cursor-not-allowed border-gray-300 text-gray-400' : ''}`} disabled={loading || !apiKey?.trim()}>
                                            {loading && loadingType === 'bullet' ? <span className="animate-pulse">✨ AI 處理中...</span> : <><Icons.List /> 🎯 轉成條列重點 {!apiKey?.trim() && '(未開放)'}</>}
                                        </Button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const VoiceSettings = () => {
            const [voices, setVoices] = useState([]);
            const [selectedURI, setSelectedURI] = useState(TTS.voiceURI);
            const [dict, setDict] = useState(TTS.dict);
            const [newWord, setNewWord] = useState(''); const [newPron, setNewPron] = useState('');

            useEffect(() => {
                const loadVoices = () => { if (window.speechSynthesis) { const availableVoices = window.speechSynthesis.getVoices(); if (availableVoices.length > 0) setVoices(availableVoices); } };
                loadVoices(); 
                if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;
            }, []);

            const handleAddDict = () => {
                if (!newWord.trim() || !newPron.trim()) return;
                const newDict = { ...dict, [newWord.trim()]: newPron.trim() };
                setDict(newDict); TTS.setDict(newDict); setNewWord(''); setNewPron('');
            };
            const handleDeleteDict = (word) => { const newDict = { ...dict }; delete newDict[word]; setDict(newDict); TTS.setDict(newDict); };

            return (
                <div className="bg-[#FFF8E7] p-5">
                    <h3 className="font-bold flex items-center gap-2 mb-4 text-gray-800 text-lg border-b border-orange-200 pb-2"><Icons.Speaker /> TTS 語音與發音校正設定</h3>
                    <div className="flex flex-col md:flex-row items-center gap-4 mb-6">
                        <label className="text-sm font-bold text-gray-700 shrink-0">1. 選擇語音包：</label>
                        <select className="flex-1 w-full p-2.5 border-2 border-orange-200 rounded-lg bg-white text-sm focus:border-orange-400 outline-none" value={selectedURI} onChange={(e) => {setSelectedURI(e.target.value); TTS.setVoice(e.target.value);}}>
                            <option value="">預設語音 (系統自動判斷)</option>
                            {voices.map(v => ( <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang})</option> ))}
                        </select>
                        <button onClick={() => TTS.speak('這是語音測試，很高興認識你！')} className="bg-orange-400 hover:bg-orange-500 text-white font-bold rounded-lg px-5 py-2.5 text-sm flex items-center gap-2 shadow-md shrink-0 transition"><Icons.Speaker /> 試聽</button>
                    </div>
                    <div className="border-t border-dashed border-orange-300 pt-4">
                        <label className="text-sm font-bold text-gray-700 mb-3 block">2. 發音校正字典 (解決破音字，例如: 和 ➔ 汗)</label>
                        <div className="flex flex-wrap gap-2 mb-4 bg-white/50 p-3 rounded-lg border border-orange-100 min-h-[50px]">
                            {Object.entries(dict).length === 0 && <span className="text-xs text-gray-400 py-1">目前沒有自訂校正詞彙</span>}
                            {Object.entries(dict).map(([word, pron]) => (
                                <span key={word} className="inline-flex items-center gap-1 bg-white text-gray-800 px-3 py-1 rounded-full text-sm font-bold border-2 border-orange-200 shadow-sm">
                                    {word} ➔ <span className="text-orange-600">{pron}</span>
                                    <button onClick={() => handleDeleteDict(word)} className="text-gray-300 hover:text-red-500 hover:bg-red-50 w-5 h-5 rounded-full flex items-center justify-center ml-1 transition-colors">x</button>
                                </span>
                            ))}
                        </div>
                        <div className="flex items-center gap-3 bg-white p-3 rounded-xl border border-orange-200 shadow-sm">
                            <input type="text" placeholder="原本的字" value={newWord} onChange={e => setNewWord(e.target.value)} className="flex-1 p-2 border-2 border-gray-200 rounded-lg text-sm text-center focus:border-orange-400 outline-none font-bold" />
                            <span className="font-bold text-orange-400">➔</span>
                            <input type="text" placeholder="怎麼唸" value={newPron} onChange={e => setNewPron(e.target.value)} className="flex-1 p-2 border-2 border-gray-200 rounded-lg text-sm text-center focus:border-orange-400 outline-none font-bold" />
                            <Button onClick={handleAddDict} className="bg-orange-500 hover:bg-orange-600 border-none shrink-0 px-6">新增</Button>
                        </div>
                    </div>
                </div>
            );
        };

        const TutorialModal = ({ onClose, user, tutorialData }) => {
            let parsedData = DEFAULT_TUTORIAL_DATA;
            try {
                parsedData = typeof tutorialData === 'string' ? JSON.parse(tutorialData) : tutorialData;
            } catch(e) {}

            const markAsSeen = () => {
                if (user && user !== 'admin') {
                    localStorage.setItem(`tut_${user}`, 'true');
                }
                TTS.stop();
                onClose();
            };

            const colorMap = {
                'blue': 'bg-blue-50 border-blue-200 text-blue-800',
                'pink': 'bg-pink-50 border-pink-200 text-pink-800',
                'yellow': 'bg-yellow-50 border-yellow-200 text-yellow-800',
                'green': 'bg-green-50 border-green-200 text-green-800'
            };

            const playAll = () => {
                let fullText = parsedData.intro + '。';
                parsedData.steps.filter(s => s.visible !== false).forEach(step => {
                    fullText += step.title + '，' + stripTagsForTTS(step.text) + '。';
                });
                TTS.speak(fullText);
            };

            const playStep = (step) => {
                TTS.speak(step.title + '，' + stripTagsForTTS(step.text));
            };

            const playIntro = () => {
                TTS.speak(parsedData.intro);
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 overflow-y-auto" onClick={markAsSeen}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl animate-fadeIn my-8 border-t-8 border-t-serenity flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                        <div className="p-5 md:p-6 border-b border-gray-100 flex justify-between items-center shrink-0">
                            <h2 className="text-xl md:text-2xl font-bold text-serenity flex items-center gap-2"><Icons.Help /> 新手指南</h2>
                            <div className="flex items-center gap-3">

        const LoginView = ({ setUser, setView, setShowTutorial, adminPwd, setAdminPwd, showAlert, showConfirm, mainTitle }) => {
            const [name, setName] = useState('');
            const [pwd, setPwd] = useState('');
            const [showAdminLogin, setShowAdminLogin] = useState(false);

            const handleStudentLogin = () => {
                if (!name.trim()) return showAlert('請輸入姓名！');
                setUser(name.trim()); setView('dashboard');
                if (!localStorage.getItem(`tut_${name.trim()}`)) setShowTutorial(true);
            };

            const handleAdminLogin = () => {
                const inputClean = pwd.replace(/[\s"']/g, '');
                const storedClean = String(adminPwd).replace(/[\s"']/g, '');
                if (inputClean === storedClean) { setUser('admin'); setView('admin'); } 
                else { showAlert('密碼錯誤！請重新輸入。'); }
            };

            const handleResetPassword = () => {
                showConfirm('忘記密碼了嗎？\n按下確定將強制把密碼重置為預設的「0000」。', () => {
                    localStorage.removeItem('adminPwd');
                    setAdminPwd(DEFAULT_PWD);
                    showAlert('✅ 密碼已成功重置為「0000」！請重新登入。');
                });
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">

                            <div className="space-y-4 animate-fadeIn">

                                <Button onClick={handleAdminLogin} variant="secondary" className="w-full text-lg py-4 shadow-md bg-gray-700 text-white hover:bg-gray-800 border-none">登入後台</Button>

                                    <button onClick={() => setShowAdminLogin(false)} className="text-sm text-gray-400 hover:text-gray-600 underline font-bold">返回學生登入</button>
                                    <button onClick={handleResetPassword} className="text-sm text-red-400 hover:text-red-600 underline font-bold">忘記密碼？</button>

                            </div>

                    </Card>

        };

                        </div>
                        <div className="flex gap-2">

                                <option value="">所有科目</option>

                                            <div className="flex justify-between items-start mb-3">
                                                <h2 className="text-xl font-bold text-gray-800 group-hover:text-serenity transition-colors truncate max-w-[70%]" title={board.title}>{board.title}</h2>

                                            </div>
                                            <div className="mb-3"><span className="text-xs bg-serenity/10 text-serenity px-2 py-1 rounded-md font-bold border border-serenity/20 inline-flex items-center gap-1"><Icons.Layout /> {tempName}</span></div>
                                            <div className="flex flex-wrap gap-1.5 mb-4">
                                                {board.subjects.map(s => <span key={s} className="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded border border-blue-100">{s}</span>)}
                                                {board.grades.map(s => <span key={s} className="text-xs bg-pink-50 text-pink-600 px-2 py-0.5 rounded border border-pink-100">{s}</span>)}
                                            </div>
                                        </div>
                                        <div className="text-right mt-auto pt-3 border-t border-gray-100">
                                            <Button onClick={() => { setCurrentBoard(board); setView('board'); }} variant="secondary" className="w-full py-2 bg-gray-50 border border-gray-200 group-hover:bg-serenity group-hover:text-white group-hover:border-serenity transition-colors">進入看板</Button>
                                        </div>
                                    </Card>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        };

        const BoardView = ({ user, currentBoard, responses, setView, setCurrentBoard, magicUnlocked, setMagicUnlocked, adminPwd, setEditingTargetId, showAlert, showPrompt, saveResponse, deleteResponse, showConfirm, isCloudConnected, lastSyncTime, showLoader, hideLoader }) => {
            const boardResponses = responses.filter(r => r.boardId === currentBoard.id);
            const isExpired = currentBoard.expiryDate && new Date(currentBoard.expiryDate) < new Date();
            
            const myResponses = boardResponses.filter(r => r.studentName === user);
            const sortedMyResponses = [...myResponses].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            const latestMyResponse = sortedMyResponses[0];
            
            const [showMultiChoiceModal, setShowMultiChoiceModal] = useState(false);
            const [collapsedIds, setCollapsedIds] = useState(new Set());

            const templateId = currentBoard.templateId || 'ORID';
            const templateConfig = TEMPLATES[templateId] || TEMPLATES['ORID'];
            const fields = currentBoard.fields || templateConfig.defaultFields;
            const getAnswers = (responseObj) => responseObj.answers || { O: responseObj.O, R: responseObj.R, I: responseObj.I, D: responseObj.D };

            const handleAddOrEdit = () => {
                if (isExpired && user !== 'admin') return showAlert('此看板已截止，無法新增或編輯。');
                
                if (myResponses.length === 0) {
                    setEditingTargetId('new'); 
                    setView('form');
                } else if (!currentBoard.allowMultipleResponses) {
                    setEditingTargetId(latestMyResponse.id); 
                    setView('form');
                } else {
                    setShowMultiChoiceModal(true);
                }
            };
            
            const unlockMagic = () => { 
                showPrompt('請輸入老師專用魔法密碼：', (pwd) => { 
                    const inputClean = pwd.replace(/[\s"']/g, '');
                    const storedClean = String(adminPwd).replace(/[\s"']/g, '');
                    if (inputClean === storedClean) { setMagicUnlocked(true); showAlert('✅ 魔法解鎖成功！您現在可以編輯任何人的留言。'); } 
                    else { showAlert('密碼錯誤！解鎖失敗。'); } 
                }, '', 'password'); 
            };

            const handleBatchVisibility = async (vis) => {
                showLoader('批次更新中...');
                let count = 0;
                try {
                    for (const r of boardResponses) {
                        if (r.feedbackVisibility !== vis && r.feedback) {
                            // 使用 await 確認順序處理，若不需要可拿掉
                            await saveResponse({ ...r, feedbackVisibility: vis });
                            count++;
                        }
                    }
                    showAlert(`✅ 批次設定完成！共更新了 ${count} 筆回饋權限。`);
                } catch (e) {
                    showAlert('❌ 批次設定失敗：' + e.message);
                } finally {
                    hideLoader();
                }
            };
            
            const toggleCollapse = (id) => {
                setCollapsedIds(prev => {
                    const n = new Set(prev);
                    if(n.has(id)) n.delete(id);
                    else n.add(id);
                    return n;
                });
            };
            
            const collapseAll = () => setCollapsedIds(new Set(boardResponses.map(r => r.id)));
            const expandAll = () => setCollapsedIds(new Set());

            return (
                <div className="max-w-5xl mx-auto p-4 pt-8 pb-20 relative">
                    {showMultiChoiceModal && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 animate-fadeIn" onClick={() => setShowMultiChoiceModal(false)}>

                                <p className="text-sm text-gray-500 mb-6 font-bold">老師已開放重複填寫，您可以選擇新增一張全新的想法單，或是繼續編輯最新的一張。</p>

                                    <Button onClick={() => { setShowMultiChoiceModal(false); setEditingTargetId('new'); setView('form'); }} className="py-3 shadow-md border-2 border-serenity">➕ 新增新的想法單</Button>
                                    <Button onClick={() => { setShowMultiChoiceModal(false); setEditingTargetId(latestMyResponse.id); setView('form'); }} variant="outline" className="py-3 bg-gray-50 border-gray-300 text-gray-700 hover:bg-gray-100 hover:text-gray-900 border-2">📝 編輯舊的想法單</Button>
                                    <button onClick={() => setShowMultiChoiceModal(false)} className="text-gray-400 mt-2 text-sm hover:text-gray-600 font-bold">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center mb-6">
                        <Button onClick={() => {setView(user === 'admin' ? 'admin' : 'dashboard'); setCurrentBoard(null);}} variant="outline" className="bg-white/50 border-white text-white hover:bg-white hover:text-serenity shadow-sm">
                            <Icons.Home /> {user === 'admin' ? '回到後台' : '回大廳'}

                    <div className="bg-white/90 backdrop-blur rounded-2xl p-5 mb-6 flex flex-col gap-3 shadow-lg border-t-4 border-t-serenity">
                        <div className="flex flex-wrap justify-between items-center gap-4 w-full">
                            <div className="flex items-center gap-4">
                                <span className="bg-blue-50 text-blue-800 px-3 py-1.5 rounded-lg font-bold border border-blue-100 flex items-center gap-2">👥 參與人數 <span className="bg-white px-2 py-0.5 rounded shadow-sm">{boardResponses.length}</span></span>
                                {isExpired && <span className="text-red-600 font-bold text-sm bg-red-100 px-3 py-1.5 rounded-lg border border-red-200">⛔ 已截止討論</span>}

                            </div>
                            <div className="flex gap-3">
                                <button onClick={unlockMagic} className="text-gray-400 hover:text-yellow-500 p-2 bg-gray-50 rounded-lg hover:bg-yellow-50 border border-transparent hover:border-yellow-200 transition-colors" title="呼叫老師魔法 (解鎖編輯他人權限)"><Icons.Unlock /></button>

                            </div>
                        </div>
                        
                        {boardResponses.length > 0 && (
                            <div className="flex flex-col gap-2 w-full mt-2 border-t border-blue-100/50 pt-3">

                            {fields.map(field => (
                                <div key={'guide-'+field.id} className="bg-blue-50/50 p-4 rounded-xl border border-blue-100 shadow-sm flex flex-col gap-3">
                                    <div className="flex justify-between items-start border-b border-blue-100/50 pb-2">
                                        <h3 className="font-bold text-blue-800 text-lg flex items-center gap-2 flex-wrap">
                                            <span className="bg-blue-200 text-blue-800 rounded px-1.5 py-0.5 text-xs">{field.id.length > 2 ? field.id.substring(0,2) : field.id}</span>

                                            <span className="text-xs bg-white text-blue-600 border border-blue-200 px-2 py-0.5 rounded shadow-sm">{getFieldTypeName(field.type)}</span>
                                            <button onClick={() => TTS.speak(field.title)} className="text-blue-400 hover:text-blue-600 p-1 ml-1" title="單獨朗讀短標題" type="button"><Icons.Speaker /></button>

                                        <p className="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap font-bold flex-1">{field.guide}</p>
                                        <button onClick={() => TTS.speak(field.guide)} className="text-blue-500 hover:text-blue-700 p-1.5 shrink-0 bg-white rounded-lg shadow-sm border border-blue-200 transition-colors" title="單獨朗讀引導說明" type="button"><Icons.Speaker /></button>
                                    </div>
                                    
                                    {/* 新增：如果該題目有附圖，則在老師的引導語中顯示 */}
                                    {field.questionImage && (
                                        <div className="w-full mt-2 text-center border-t border-blue-100 pt-3">
                                            <img src={field.questionImage} alt="題目附圖" className="w-full max-h-[45vh] md:max-h-[300px] object-contain rounded-xl border border-blue-200/50 shadow-sm bg-white p-1.5" />
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    {user === 'admin' && boardResponses.length > 0 && (

                            <div className="flex items-center flex-wrap gap-3">
                                <span className="text-sm font-bold text-yellow-800 flex items-center gap-1"><Icons.Settings /> 批次設定回饋權限：</span>

                                <Button onClick={() => handleBatchVisibility('public')} variant="outline" className="text-xs py-1.5 px-3 border-green-400 text-green-700 bg-white hover:bg-green-50">全部全班可見</Button>

                    {currentBoard.allowCollapse && boardResponses.length > 0 && (
                        <div className="flex gap-2 justify-end mb-4">
                            <button onClick={expandAll} className="text-xs font-bold text-gray-600 bg-white/80 hover:bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-200">🔽 全部展開</button>
                            <button onClick={collapseAll} className="text-xs font-bold text-gray-600 bg-white/80 hover:bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-200">🔼 全部收合</button>

                                const canSeeLikesCount = currentBoard.showLikesCount || user === 'admin';

                                <Card id={`response-${r.id}`} key={r.id} className={`relative overflow-hidden group shadow-md transition-all duration-300 border border-gray-100 ${isCollapsed ? 'pb-3' : ''}`}>

                                            <Button onClick={() => { setEditingTargetId(r.id); setView('form'); }} variant="outline" className="text-xs py-1.5 px-3 bg-white">編輯</Button>

                                                <Button onClick={() => { showConfirm(`確定要刪除 ${r.studentName} 的這筆留言嗎？`, () => { deleteResponse(r.id); showAlert('✅ 留言已刪除。'); }); }} variant="danger" className="text-xs py-1.5 px-3 shadow-sm border border-red-500">刪除</Button>

                                                        onClick={(e) => {
                                                            e.stopPropagation();

                                                            if (isExpired) return showAlert('看板已截止，無法按愛心囉。');
                                                            if (!currentBoard.allowLikes) return showAlert('目前未開放按愛心功能喔！');
                                                            
                                                            let newLikes = [...likes];
                                                            if (hasLiked) newLikes = newLikes.filter(u => u !== user);
                                                            else newLikes.push(user);
                                                            
                                                            const updatedResponse = { ...r, likes: newLikes };
                                                            if (!updatedResponse.answers) updatedResponse.answers = { O: r.O, R: r.R, I: r.I, D: r.D };
                                                            
                                                            saveResponse(updatedResponse);
                                                        }}

                                                            hasLiked ? 'bg-pink-50 border-pink-200 text-pink-600' : 'bg-gray-50 border-gray-200 text-gray-500'

                                                        title={user === 'admin' ? `按讚學生：${likes.join(', ')}` : ''}
                                                        disabled={!canLike && user !== 'admin'}
                                                    >
                                                        <span className={`text-lg ${hasLiked ? 'text-pink-500' : 'grayscale opacity-60'}`}>❤️</span>
                                                        {(canSeeLikesCount || (user === r.studentName)) && likes.length > 0 && (

                                                        )}
                                                    </button>
                                                    {user === 'admin' && likes.length > 0 && (

                                                            ❤️ 按讚: {likes.join(', ')}
                                                        </span>
                                                    )}
                                                </div>
                                            )}
                                            
                                            {currentBoard.allowCollapse && (
                                                <button onClick={() => toggleCollapse(r.id)} className="bg-gray-100 hover:bg-gray-200 p-2 rounded-lg text-xs font-bold text-gray-600 transition-colors shadow-sm" title={isCollapsed ? "展開內容" : "收合內容"}>
                                                    {isCollapsed ? '🔽' : '🔼'}
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className={isCollapsed ? 'hidden' : 'block'}>
                                        <div className={`grid gap-4 ${templateConfig.layout}`}>
                                            {fields.map(field => {
                                                const ans = getAnswers(r)[field.id] || { level1: '', level2: '', level3: '', stage: 'raw', imageUrl: null, audioUrl: null, choices: [], otherText: '' };
                                                if(!ans.level3 && !ans.imageUrl && !ans.audioUrl && user !== 'admin') return null; 
                                                return (
                                                    <div key={field.id} className={`bg-gray-50 rounded-xl p-4 border border-gray-200 shadow-sm ${templateId === 'MANDALA' && field.id === 'M5' ? 'ring-2 ring-serenity bg-blue-50/50' : ''}`}>
                                                        <div className="flex justify-between items-start mb-3 border-b border-gray-200 pb-2">
                                                            <div className="flex items-center gap-2 flex-wrap">
                                                                <span className={`font-bold px-2 py-1 rounded text-sm shadow-sm ${templateId === 'MANDALA' && field.id === 'M5' ? 'bg-serenity text-white' : 'bg-blue-100 text-blue-800 border border-blue-200'}`}>{field.title}</span>
                                                                <span className="text-xs text-gray-500 bg-white border border-gray-200 px-1.5 py-0.5 rounded">{getFieldTypeName(field.type)}</span>
                                                            </div>
                                                            <button onClick={() => TTS.speak(`${field.title}。${ans.level3 || ''}`)} className="text-gray-400 hover:text-serenity bg-white rounded-full p-1 shadow-sm"><Icons.Speaker /></button>
                                                        </div>
                                                        
                                                        {ans.level3 ? (
                                                            <div>
                                                                <p className="text-gray-700 whitespace-pre-wrap leading-relaxed">{ans.level3}</p>
                                                                {(field.type === 'radio' || field.type === 'checkbox') && (ans.choices || []).length > 0 && (
                                                                    <div className="mt-2 flex flex-wrap gap-2">
                                                                        {(ans.choices || []).map(c => field.optionImages?.[c] ? (
                                                                            <img key={c} src={field.optionImages[c]} alt={c} className="h-24 object-contain rounded-lg border border-gray-200 shadow-sm bg-white p-1" title={c} />
                                                                        ) : null)}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        ) : <p className="text-gray-400 text-sm italic">未填寫文字內容</p>}
                                                        
                                                        {ans.audioUrl && <div className="mt-3 bg-white p-2 rounded-lg border border-gray-200 shadow-sm"><audio src={ans.audioUrl} controls className="h-10 w-full" /></div>}
                                                        {ans.imageUrl && <div className="mt-3 text-center bg-white p-2 rounded-lg border border-gray-200 shadow-sm"><img src={ans.imageUrl} alt="Student uploaded" className="max-h-64 mx-auto rounded-md" /></div>}
                                                        
                                                        {user === 'admin' && ans.level1 && (field.type === 'text' || !field.type) && (
                                                            <div className="mt-4 text-xs bg-gray-100 p-3 rounded-lg border border-gray-300">
                                                                <div className="font-bold text-gray-700 mb-1.5 border-b border-gray-200 pb-1 flex items-center gap-1">👀 歷程分析</div>
                                                                {!ans.stage || ans.stage === 'raw' ? <div className="text-gray-500">純手動輸入 (無使用 AI)</div> : (
                                                                    <div className="space-y-1.5 mt-1">
                                                                        <div className="text-gray-500"><span className="font-bold">1. 原始內容:</span> {ans.level1}</div>
                                                                        <div className="text-blue-600"><span className="font-bold">2. AI {ans.stage === 'summary' ? '摘要' : '條列'}:</span> {ans.level2}</div>
                                                                        {(ans.level2 || '').trim() !== (ans.level3 || '').trim() ? <div className="text-green-600 font-bold bg-green-50 px-2 py-1 rounded inline-block mt-1">✓ 學生有進一步手動修改 AI 內容</div> : <div className="text-red-500 font-bold bg-red-50 px-2 py-1 rounded inline-block mt-1">⚠ 學生直接套用 AI 內容，未修改</div>}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="mt-5 border-t-2 border-dashed border-gray-200 pt-4">
                                            {user === 'admin' ? (
                                                <div className="bg-yellow-50 p-4 rounded-xl border-2 border-yellow-300 shadow-inner relative">
                                                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-3">
                                                        <label className="text-sm font-bold text-yellow-800 flex items-center gap-1">📝 給 {r.studentName} 的回饋：</label>
                                                        <div className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-yellow-300 shadow-sm">
                                                            <span className="text-xs font-bold text-gray-600">👀 誰能看見？</span>
                                                            <select className="text-xs font-bold bg-transparent text-yellow-800 outline-none cursor-pointer" value={r.feedbackVisibility || 'private'} onChange={(e) => { saveResponse({...r, feedbackVisibility: e.target.value}); }}>
                                                                <option value="hidden">隱藏 (僅老師可見)</option>
                                                                <option value="private">僅作者 ({r.studentName}) 可見</option>
                                                                <option value="public">全班皆可見</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <textarea className="w-full p-3 border-2 border-yellow-200 rounded-lg focus:outline-none focus:border-yellow-400 focus:ring-2 focus:ring-yellow-200 bg-white text-gray-800" rows="2" defaultValue={r.feedback || ''} onBlur={(e) => { if(e.target.value !== (r.feedback || '')) { saveResponse({...r, feedback: e.target.value}); } }} placeholder="輸入您對這位學生的回饋... (離開輸入框自動儲存)" />
                                                    <div className="text-xs text-gray-400 mt-2 flex justify-between font-bold"><span>💡 離開輸入框即自動儲存</span>{r.feedback && <span className="text-green-600 bg-green-100 px-2 py-0.5 rounded">✓ 已儲存</span>}</div>
                                                </div>
                                            ) : (
                                                r.feedback && r.feedbackVisibility !== 'hidden' && canSeeFeedback && (
                                                    <FeedbackDisplay feedback={r.feedback} type={r.feedbackVisibility} />
                                                )
                                            )}
                                        </div>
                                    </div>
                                </Card>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        };

        const FormView = ({ user, currentBoard, responses, setView, saveResponse, geminiKey, editingTargetId, setShowTutorial, showAlert, showLoader, hideLoader }) => {
            const templateId = currentBoard.templateId || 'ORID';
            const templateConfig = TEMPLATES[templateId] || TEMPLATES['ORID'];
            const fields = currentBoard.fields || templateConfig.defaultFields;
            
            const initialResponse = useRef(
                (editingTargetId === 'new' || !editingTargetId) 
                    ? null 
                    : responses.find(r => r.id === editingTargetId)
            );

            const defaultDim = { level1: '', level2: '', level3: '', stage: 'raw', imageUrl: null, audioUrl: null, choices: [], otherText: '' };
            const initFormData = () => {
                let data = {};
                if (initialResponse.current) {
                    const oldAns = initialResponse.current.answers || { O: initialResponse.current.O, R: initialResponse.current.R, I: initialResponse.current.I, D: initialResponse.current.D };
                    fields.forEach(f => { data[f.id] = oldAns[f.id] || { ...defaultDim }; });
                } else { fields.forEach(f => { data[f.id] = { ...defaultDim }; }); }
                return data;
            };

            const [formData, setFormData] = useState(initFormData());
            const studentNameForThisForm = initialResponse.current ? initialResponse.current.studentName : user;

            const handleSave = async () => {
                const isDimFilled = (dim) => dim && (dim.level3.trim() !== '' || !!dim.imageUrl || !!dim.audioUrl);
                
                let allFieldsFilled = true;
                for (const f of fields) {
                    if (!isDimFilled(formData[f.id])) {
                        allFieldsFilled = false;
                        break;
                    }
                }
                
                if (!allFieldsFilled) {
                    return showAlert('請確保每個題目都有填寫內容、選擇項目、上傳照片或錄製語音喔！');
                }

                try {
                    const latestResponse = responses.find(r => r.id === (initialResponse.current?.id)) || initialResponse.current;
                    
                    const payload = { 
                        ...(latestResponse || {}), 
                        id: latestResponse ? latestResponse.id : generateId(), 
                        boardId: currentBoard.id, 
                        studentName: studentNameForThisForm, 
                        answers: formData, 
                        timestamp: new Date().toISOString(), 
                        feedbackVisibility: latestResponse?.feedbackVisibility || 'private', 
                        likes: latestResponse?.likes || [] 
                    };
                    saveResponse(payload);
                    showAlert('✅ 討論單送出成功！');
                    setView('board');
                } catch (err) { showAlert(`儲存失敗：${err.message}`); } 
            };

            return (
                <div className="max-w-4xl mx-auto p-4 pt-8 pb-20">
                    <div className="flex justify-between items-center mb-6">
                        <Button onClick={() => setView('board')} variant="outline" className="bg-white/50 border-white text-white hover:bg-white hover:text-serenity shadow-sm">取消返回</Button>
                        <h1 className="text-2xl font-bold text-white drop-shadow-md text-center flex-1 mx-4 truncate">{initialResponse.current ? '編輯想法' : '新增想法'} - {currentBoard.title}</h1>
                        <Button onClick={() => setShowTutorial(true)} variant="outline" className="bg-white/90 text-serenity border-white shadow-sm hover:bg-white"><Icons.Help /> 新手指南</Button>
                    </div>
                    <Card className="mb-6 shadow-2xl border-t-8 border-t-serenity">
                        <div className="mb-6 pb-4 border-b-2 border-gray-100 flex justify-between items-center">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2"><span className="bg-gray-100 px-3 py-1 rounded-lg text-sm text-gray-500 border border-gray-200">作者</span> {studentNameForThisForm}</h2>
                            {initialResponse.current && <span className="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-sm font-bold border border-yellow-200">編輯模式</span>}
                        </div>
                        {fields.map(field => <FieldSection key={field.id} field={field} value={formData[field.id] || { ...defaultDim }} onChange={(v) => setFormData({...formData, [field.id]: v})} apiKey={geminiKey} showAlert={showAlert} />)}
                        <div className="mt-8 text-center pt-6 border-t border-gray-100">
                            <Button onClick={handleSave} className="w-full max-w-md mx-auto py-4 text-xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1">
                                🚀 送出我的討論單
                            </Button>
                        </div>
                    </Card>
                </div>
            );
        };

        const AdminView = ({ boards, responses, saveBoard, deleteBoard, saveResponse, setView, setCurrentBoard, setUser, adminPwd, setAdminPwd, geminiKey, setGeminiKey, tutorialData, saveTutorial, showAlert, showConfirm, gasUrl, setGasUrl, isCloudConnected, lastSyncTime, uploadLocalToCloud, hasLocalDataToUpload, setShowSetupGuide, mainTitle, setMainTitle, saveSetting, showLoader, hideLoader }) => {
            const [activeTab, setActiveTab] = useState('boards'); 
            const [editingBoard, setEditingBoard] = useState(null);
            
            let parsedTutData = DEFAULT_TUTORIAL_DATA;
            try { parsedTutData = typeof tutorialData === 'string' ? JSON.parse(tutorialData) : tutorialData; } catch(e) {}
            if (parsedTutData && parsedTutData.steps) parsedTutData.steps = parsedTutData.steps.map(step => ({ ...step, visible: step.visible !== false }));
            const [tutForm, setTutForm] = useState(parsedTutData);
            const [loadingAiTut, setLoadingAiTut] = useState(false);
            
            const [selectedTemplate, setSelectedTemplate] = useState('ORID');
            const [boardFields, setBoardFields] = useState(TEMPLATES['ORID'].defaultFields);
            const [customFieldsCount, setCustomFieldsCount] = useState(1);
            
            const [allowMultipleResponses, setAllowMultipleResponses] = useState(false);
            const [allowLikes, setAllowLikes] = useState(false);
            const [showLikesCount, setShowLikesCount] = useState(false);
            const [allowCollapse, setAllowCollapse] = useState(false);
            
            const [selectedExportBoards, setSelectedExportBoards] = useState(new Set());
            const [newSubj, setNewSubj] = useState(''); const [newGrade, setNewGrade] = useState('');
            const [localMainTitle, setLocalMainTitle] = useState(mainTitle);
            
            const [showTeacherGuide, setShowTeacherGuide] = useState(false);
            const [showImportGuide, setShowImportGuide] = useState(false);
            const [importFile, setImportFile] = useState(null);
            const [showImportDialog, setShowImportDialog] = useState(false);

            useEffect(() => {
                if (!localStorage.getItem('hasSeenTeacherGuide')) { setShowTeacherGuide(true); localStorage.setItem('hasSeenTeacherGuide', 'true'); }
                if (!localStorage.getItem('hasSeenImportGuide')) { setShowImportGuide(true); localStorage.setItem('hasSeenImportGuide', 'true'); }
            }, []);

            useEffect(() => { 
                let parsed = DEFAULT_TUTORIAL_DATA;
                try { parsed = typeof tutorialData === 'string' ? JSON.parse(tutorialData) : tutorialData; } catch(e) {}
                if (parsed && parsed.steps) parsed.steps = parsed.steps.map(step => ({ ...step, visible: step.visible !== false }));
                setTutForm(parsed); 
            }, [tutorialData]);

            useEffect(() => {
                if (editingBoard) {
                    const tempId = editingBoard.templateId || 'ORID';
                    setSelectedTemplate(tempId); setBoardFields(editingBoard.fields || TEMPLATES[tempId].defaultFields);
                    if (tempId === 'CUSTOM') setCustomFieldsCount(editingBoard.fields?.length || 1);
                    
                    setAllowMultipleResponses(editingBoard.allowMultipleResponses || false);
                    setAllowLikes(editingBoard.allowLikes || false);
                    setShowLikesCount(editingBoard.showLikesCount || false);
                    setAllowCollapse(editingBoard.allowCollapse || false);

                    const customSubjs = (editingBoard.subjects || []).filter(s => !SUBJECTS.includes(s));
                    setNewSubj(customSubjs.join(', '));
                    const customGrades = (editingBoard.grades || []).filter(g => !GRADES.includes(g));
                    setNewGrade(customGrades.join(', '));
                } else { 
                    setSelectedTemplate('ORID'); setBoardFields(TEMPLATES['ORID'].defaultFields); setCustomFieldsCount(1); 
                    setAllowMultipleResponses(false); setAllowLikes(false); setShowLikesCount(false); setAllowCollapse(false);
                    setNewSubj(''); setNewGrade('');
                }
            }, [editingBoard]);

            const handleTemplateChange = (e) => {
                const tempId = e.target.value; setSelectedTemplate(tempId);
                if (tempId === 'CUSTOM') handleCustomFieldsCountChange({ target: { value: customFieldsCount } });
                else setBoardFields(JSON.parse(JSON.stringify(TEMPLATES[tempId].defaultFields)));
            };

            const handleCustomFieldsCountChange = (e) => {
                let count = parseInt(e.target.value, 10);
                if (isNaN(count) || count < 1) count = 1;
                setCustomFieldsCount(count);
                const newFields = [];
                for (let i = 1; i <= count; i++) {
                    const existingField = boardFields.find(f => f.id === `C${i}`);
                    if (existingField) newFields.push(existingField);
                    else newFields.push({ id: `C${i}`, title: `自訂欄位 ${i}`, guide: '請輸入引導語...', type: 'text', options: '', allowOther: false });
                }
                setBoardFields(newFields);
            };

            const handleFieldChange = (id, key, value) => setBoardFields(boardFields.map(f => f.id === id ? { ...f, [key]: value } : f));

            const handleApplyDifficulty = () => {
                const diff = document.querySelector('[name="difficulty"]').value; const style = document.querySelector('[name="style"]').value;
                if (PROMPTS_CONFIG[selectedTemplate]) {
                    const prompts = PROMPTS_CONFIG[selectedTemplate][diff][style];
                    setBoardFields(boardFields.map(f => ({ ...f, guide: prompts[f.id] || f.guide })));
                    showAlert(`✅ 已套用 ${selectedTemplate} 的 ${diff}-${style} 預設引導語！`);
                } else { showAlert('這個模板目前沒有內建的難度引導語喔！請自訂。'); }
            };

            const handleSaveBoardForm = async (e) => {
                e.preventDefault(); const fd = new FormData(e.target);
                
                if (boardFields.some(f => !f.title.trim() || !f.guide.trim())) return showAlert('請確保所有欄位的「標題」與「引導語」都已填寫。');

                const finalSubjects = [...fd.getAll('subjects')]; 
                if (fd.get('otherSubjCheckbox') && newSubj.trim()) finalSubjects.push(newSubj.trim());
                
                const finalGrades = [...fd.getAll('grades')]; 
                if (fd.get('otherGradeCheckbox') && newGrade.trim()) finalGrades.push(newGrade.trim());

                if(finalSubjects.length === 0 || finalGrades.length === 0) return showAlert('請至少選擇一個科目與年級（如果上方沒有適合的，請在最下方勾選「其他」並輸入您的自訂內容喔）');

                const newBoard = { 
                    id: editingBoard?.id || generateId(), title: fd.get('title'), templateId: selectedTemplate, fields: boardFields, 
                    subjects: finalSubjects, grades: finalGrades, difficulty: fd.get('difficulty') || '簡單', style: fd.get('style') || '一般', 
                    expiryDate: fd.get('expiryDate') || null,
                    allowMultipleResponses, allowLikes, showLikesCount, allowCollapse,
                    isVisible: editingBoard?.isVisible !== false
                };
                
                try { 
                    saveBoard(newBoard); 
                    showAlert('✅ 看板儲存成功！');
                    setEditingBoard(null); 
                    setActiveTab('boards'); 
                } catch (err) { showAlert(`看板儲存失敗：${err.message}`); }
            };

            const escapeCsv = (str) => !str ? '""' : `"${str.toString().replace(/"/g, '""')}"`;
            const getBoardsToExport = () => selectedExportBoards.size > 0 ? boards.filter(b => selectedExportBoards.has(b.id)) : boards;

            const exportCsv = () => {
                const boardsToExport = getBoardsToExport();
                if (boardsToExport.length === 0) return showAlert("沒有可匯出的看板資料！");
                let csvContent = '\uFEFF主題,科目(以|分隔),適用年級(以|分隔),引導難度,語氣風格,學生姓名,內容1,內容2,內容3,內容4,留言時間,老師回饋,獲得愛心數\n';
                boardsToExport.forEach(b => {
                    const bResps = responses.filter(r => r.boardId === b.id);
                    if (bResps.length === 0) csvContent += `${escapeCsv(b.title)},${escapeCsv(b.subjects.join('|'))},${escapeCsv(b.grades.join('|'))},${escapeCsv(b.difficulty)},${escapeCsv(b.style)},"","","","","","","",""\n`;
                    else bResps.forEach(r => {
                        const ans = r.answers || { O: r.O, R: r.R, I: r.I, D: r.D };
                        let texts = ['', '', '', ''];
                        if (b.templateId && b.templateId !== 'ORID') texts[0] = (b.fields || []).map(f => `[${f.title}] ${ans[f.id]?.level3 || ''}`).join('\n');
                        else { texts[0]=ans.O?.level3||''; texts[1]=ans.R?.level3||''; texts[2]=ans.I?.level3||''; texts[3]=ans.D?.level3||''; }
                        const likesCount = (r.likes || []).length;
                        csvContent += `${escapeCsv(b.title)},${escapeCsv(b.subjects.join('|'))},${escapeCsv(b.grades.join('|'))},${escapeCsv(b.difficulty)},${escapeCsv(b.style)},${escapeCsv(r.studentName)},${escapeCsv(texts[0])},${escapeCsv(texts[1])},${escapeCsv(texts[2])},${escapeCsv(texts[3])},${escapeCsv(r.timestamp)},${escapeCsv(r.feedback)},${likesCount}\n`;
                    });
                }); downloadFile(csvContent, 'csv', '歷史看板資料');
            };

            const exportTxt = () => {
                const boardsToExport = getBoardsToExport();
                if (boardsToExport.length === 0) return showAlert("沒有可匯出的看板資料！");
                let content = '';
