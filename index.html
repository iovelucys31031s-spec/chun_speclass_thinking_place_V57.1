                                        <div className="flex justify-between items-center mb-4 border-b border-gray-200 pb-3">
                                            <h2 className="text-xl font-bold text-serenity flex items-center gap-2"><Icons.List /> 已建立的看板列表</h2>
                                            <span className="bg-gray-100 text-gray-600 px-3 py-1 rounded-lg font-bold text-sm shadow-sm border border-gray-200">總計：{boards.length} 個</span>
                                        </div>
                                        <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
                                            <table className="w-full text-left text-sm whitespace-nowrap">
                                                <thead>
                                                    <tr className="bg-gray-100 text-gray-700">
                                                        <th className="p-4 font-bold border-b border-gray-200">看板主題</th><th className="p-4 font-bold border-b border-gray-200">模板與狀態</th><th className="p-4 font-bold border-b border-gray-200">適用科目/年級</th><th className="p-4 font-bold border-b border-gray-200 text-center">資料統計</th><th className="p-4 font-bold border-b border-gray-200 text-center">快速操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="bg-white divide-y divide-gray-100">
                                                    {boards.map(b => {
                                                        const count = responses.filter(r => r.boardId === b.id).length;
                                                        const expired = b.expiryDate && new Date(b.expiryDate) < new Date();
                                                        const tempName = TEMPLATES[b.templateId || 'ORID']?.name || '未知';
                                                        return (
                                                            <tr key={b.id} className="hover:bg-blue-50/50 transition-colors group">
                                                                <td className="p-4"><div className="font-bold text-gray-800 max-w-[200px] truncate text-base mb-1" title={b.title}>{b.title}</div><div className="text-xs text-gray-400 font-mono">ID: {b.id.substring(0,6)}...</div></td>
                                                                <td className="p-4 space-y-2"><div><span className="bg-blue-50 text-blue-700 border border-blue-200 rounded-md px-2 py-0.5 text-xs font-bold shadow-sm">{tempName}</span></div><div className="flex gap-1 flex-wrap">{expired ? <span className="text-red-600 font-bold text-xs bg-red-50 border border-red-200 px-2 py-0.5 rounded-md shadow-sm">已截止</span> : <span className="text-green-700 font-bold text-xs bg-green-50 border border-green-200 px-2 py-0.5 rounded-md shadow-sm">開放中</span>}{b.isVisible === false && <span className="text-gray-600 font-bold text-xs bg-gray-100 border border-gray-300 px-2 py-0.5 rounded-md shadow-sm">已隱藏</span>}</div></td>
                                                                <td className="p-4"><div className="text-xs text-gray-600 mb-1 max-w-[150px] truncate" title={b.subjects.join(', ')}>📚 {b.subjects.join(', ')}</div><div className="text-xs text-gray-600 max-w-[150px] truncate" title={b.grades.join(', ')}>🎓 {b.grades.join(', ')}</div></td>
                                                                <td className="p-4 text-center"><div className="inline-flex items-center justify-center bg-gray-50 border border-gray-200 w-10 h-10 rounded-xl text-lg font-bold text-serenity shadow-inner">{count}</div></td>
                                                                <td className="p-4">
                                                                    <div className="flex gap-2 justify-center opacity-70 group-hover:opacity-100 transition-opacity">
                                                                        <button onClick={() => { const updatedBoard = { ...b, isVisible: b.isVisible === false ? true : false }; saveBoard(updatedBoard); showAlert(`✅ 已將「${b.title}」設為 ${updatedBoard.isVisible ? '顯示' : '隱藏'}。`); }} className={`font-bold px-3 py-2 rounded-lg transition-colors border shadow-sm whitespace-nowrap text-xs ${b.isVisible === false ? 'text-gray-500 bg-gray-100 border-gray-300 hover:bg-gray-200' : 'text-emerald-700 bg-emerald-50 hover:bg-emerald-600 hover:text-white border-emerald-200'}`}>{b.isVisible === false ? '👁️ 已隱藏' : '👁️ 顯示中'}</button>
                                                                        <button onClick={() => { setCurrentBoard(b); setView('board'); }} className="text-blue-700 bg-blue-50 hover:bg-blue-600 hover:text-white font-bold px-3 py-2 rounded-lg transition-colors border border-blue-200 shadow-sm whitespace-nowrap text-xs">進入</button>
                                                                        <button onClick={() => { setEditingBoard(b); setActiveTab('edit_board'); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="text-yellow-700 bg-yellow-50 hover:bg-yellow-500 hover:text-white font-bold px-3 py-2 rounded-lg transition-colors border border-yellow-200 shadow-sm whitespace-nowrap text-xs">設定</button>
                                                                        <button onClick={() => { showConfirm(`確定刪除「${b.title}」及所有留言？`, () => { deleteBoard(b.id); showAlert('✅ 已刪除看板。'); }); }} className="text-red-600 bg-red-50 hover:bg-red-500 hover:text-white px-3 py-2 rounded-lg transition-colors border border-red-200 shadow-sm" title="刪除"><Icons.Trash /></button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                    {boards.length === 0 && <tr><td colSpan="5" className="text-center py-16 text-gray-400 font-bold text-lg bg-gray-50/50">沒有任何看板資料，請點擊上方「新增看板」。</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null); 
            const [view, setView] = useState('login'); 
            const [currentBoard, setCurrentBoard] = useState(null);
            
            const [boards, setBoards] = useState([]);
            const [responses, setResponses] = useState([]);
            
            const [showTutorial, setShowTutorial] = useState(false);
            const [showSetupGuide, setShowSetupGuide] = useState(false);
            const [magicUnlocked, setMagicUnlocked] = useState(false);
            const [editingTargetId, setEditingTargetId] = useState(null);
            
            const [adminPwd, setAdminPwd] = useState(getStoredPwd());
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('geminiKey') || '');
            const [tutorialData, setTutorialData] = useState(localStorage.getItem('offlineTutorial') || JSON.stringify(DEFAULT_TUTORIAL_DATA));
            
            const [mainTitle, setMainTitle] = useState(localStorage.getItem('mainTitle') || '想法討論板');
            const [dialogData, setDialogData] = useState(null);
            const [globalLoading, setGlobalLoading] = useState({ active: false, message: '' });
            
            const [lastSyncTime, setLastSyncTime] = useState(null);

            const [gasUrl, setGasUrl] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                const gasParam = params.get('gas');
                return gasParam ? decodeURIComponent(gasParam) : (localStorage.getItem('customGasUrl') || DEFAULT_GAS_URL);
            });
            const gasUrlRef = useRef(gasUrl);

            const isCloudConnected = Boolean(gasUrl && gasUrl.startsWith('http'));

            const offlineBoardsData = safeParse('offlineBoards', []);
            const offlineResponsesData = safeParse('offlineResponses', []);
            const hasLocalDataToUpload = offlineBoardsData.length > 0 || offlineResponsesData.length > 0;
            
            const lastSaveTimeRef = useRef(0);

            useEffect(() => { document.title = mainTitle; }, [mainTitle]);

            useEffect(() => {
                gasUrlRef.current = gasUrl;
                if (gasUrl) localStorage.setItem('customGasUrl', gasUrl); 
                else localStorage.removeItem('customGasUrl');
            }, [gasUrl]);

            const showAlert = (message) => setDialogData({ type: 'alert', message });
            const showConfirm = (message, onConfirm) => setDialogData({ type: 'confirm', message, onConfirm });
            const showPrompt = (message, onConfirm, defaultValue = '', inputType = 'text') => setDialogData({ type: 'prompt', message, onConfirm, defaultValue, inputType });

            const showLoader = (message) => setGlobalLoading({ active: true, message });
            const hideLoader = () => setGlobalLoading({ active: false, message: '' });

            const updateTime = () => {
                const now = new Date();
                const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');
                setLastSyncTime(timeString);
            };

            const loadGasData = async () => {
                const currentUrl = gasUrlRef.current;
                if (currentUrl && currentUrl.startsWith('http')) {
                    // 防呆：如果在過去 5 秒內剛儲存過資料，暫停一次背景抓取，避免抓到 Google 還沒寫入的舊快取覆蓋畫面
                    if (Date.now() - lastSaveTimeRef.current < 5000) return;

                    try {
                        const cacheBuster = "t=" + new Date().getTime();
                        const finalUrl = currentUrl + (currentUrl.includes('?') ? '&' : '?') + cacheBuster;
                        const res = await fetch(finalUrl);
                        const json = await res.json();
                        if (json.boards) { setBoards(json.boards); }
                        if (json.responses) { setResponses(json.responses); }
                        if (json.tutorialText) { setTutorialData(json.tutorialText); }
                        if (json.settings && json.settings.mainTitle) { setMainTitle(json.settings.mainTitle); localStorage.setItem('mainTitle', json.settings.mainTitle); }
                        else if (json.settings && !json.settings.mainTitle) { setMainTitle('想法討論板'); }
                        updateTime();
                    } catch (e) { console.error("GAS 讀取失敗", e); }
                } else {
                    setBoards(safeParse('offlineBoards', []));
                    setResponses(safeParse('offlineResponses', []));
                    setTutorialData(localStorage.getItem('offlineTutorial') || JSON.stringify(DEFAULT_TUTORIAL_DATA));
                    setMainTitle(localStorage.getItem('mainTitle') || '想法討論板');
                    updateTime();
                }
            };

            useEffect(() => {
                loadGasData();
                const interval = setInterval(loadGasData, 5000);
                return () => clearInterval(interval);
            }, [gasUrl]);

            // 【零延遲寫入機制】
            const syncToGas = (action, type, id, data) => {
                const currentUrl = gasUrlRef.current;
                if (currentUrl && currentUrl.startsWith('http')) {
                    // 送出前先刷新計時器，暫停背景自動重整，避免舊資料覆蓋畫面
                    lastSaveTimeRef.current = Date.now();
                    const payload = { action, type, id, data };
                    const cacheBuster = "t=" + new Date().getTime();
                    const finalUrl = currentUrl + (currentUrl.includes('?') ? '&' : '?') + cacheBuster;
                    
                    return fetch(finalUrl, { 
                        method: 'POST', 
                        body: JSON.stringify(payload), 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
                    })
                    .then(res => res.json())
                    .then(resData => {
                        if (resData.status === "error") throw new Error(resData.message);
                        // 再度刷新計時器，讓後續 5 秒不被快取干擾
                        lastSaveTimeRef.current = Date.now(); 
                    })
                    .catch(e => {
                        console.error("雲端同步失敗", e);
                    });
                }
                return Promise.resolve();
            };

            const uploadLocalToCloud = async () => {
                try {
                    for (const b of offlineBoardsData) await syncToGas('save', 'boards', b.id, b);
                    for (const r of offlineResponsesData) await syncToGas('save', 'responses', r.id, r);
                    localStorage.removeItem('offlineBoards');
                    localStorage.removeItem('offlineResponses');
                    showAlert('✅ 單機資料已全數上傳至雲端！');
                    loadGasData();
                } catch (err) {
                    showAlert('❌ 上傳過程中發生錯誤：' + err.message);
                }
            };

            const saveSetting = (key, value) => {
                localStorage.setItem(key, value);
                if (gasUrlRef.current && gasUrlRef.current.startsWith('http')) {
                    syncToGas('save', 'settings', key, value);
                }
            };

            const saveBoard = (boardData) => {
                if (!boardData.id) boardData.id = generateId();
                setBoards(prev => {
                    const nb = [...prev]; const i = nb.findIndex(b => b.id === boardData.id); if (i >= 0) nb[i] = boardData; else nb.push(boardData);
                    if (!gasUrlRef.current || !gasUrlRef.current.startsWith('http')) localStorage.setItem('offlineBoards', JSON.stringify(nb));
                    return nb;
                });
                if (gasUrlRef.current && gasUrlRef.current.startsWith('http')) {
                    syncToGas('save', 'boards', boardData.id, boardData);
                } else updateTime();
            };

            const deleteBoard = (id) => {
                setBoards(prev => {
                    const nb = prev.filter(b => b.id !== id);
                    if (!gasUrlRef.current || !gasUrlRef.current.startsWith('http')) localStorage.setItem('offlineBoards', JSON.stringify(nb));
                    return nb;
                });
                if (gasUrlRef.current && gasUrlRef.current.startsWith('http')) {
                    syncToGas('delete', 'boards', id, null);
                } else updateTime();
            };

            const saveResponse = (responseData) => {
                if (!responseData.id) responseData.id = generateId(); 
                setResponses(prev => {
                    const nr = [...prev]; const i = nr.findIndex(r => r.id === responseData.id); if (i >= 0) nr[i] = responseData; else nr.push(responseData);
                    if (!gasUrlRef.current || !gasUrlRef.current.startsWith('http')) localStorage.setItem('offlineResponses', JSON.stringify(nr));
                    return nr;
                });
                if (gasUrlRef.current && gasUrlRef.current.startsWith('http')) {
                    syncToGas('save', 'responses', responseData.id, responseData);
                } else updateTime();
            };

            const deleteResponse = (id) => {
                setResponses(prev => {
                    const nr = prev.filter(r => r.id !== id);
                    if (!gasUrlRef.current || !gasUrlRef.current.startsWith('http')) localStorage.setItem('offlineResponses', JSON.stringify(nr));
                    return nr;
                });
                if (gasUrlRef.current && gasUrlRef.current.startsWith('http')) {
                    syncToGas('delete', 'responses', id, null);
                } else updateTime();
            };

            const saveTutorial = (jsonStr) => {
                setTutorialData(jsonStr);
                if (gasUrlRef.current && gasUrlRef.current.startsWith('http')) {
                    syncToGas('save', 'settings', 'tutorial', jsonStr);
                    showAlert('✅ 新手指南內容已成功更新到雲端！');
                } else { 
                    localStorage.setItem('offlineTutorial', jsonStr); 
                    updateTime();
                    showAlert('✅ 新手指南內容已更新 (單機模式)！'); 
                }
            };

            return (
                <React.Fragment>
                    <GlobalLoader active={globalLoading.active} message={globalLoading.message} />
                    <CustomDialog dialog={dialogData} onClose={() => setDialogData(null)} />
                    {showTutorial && <TutorialModal onClose={() => setShowTutorial(false)} user={user} tutorialData={tutorialData} />}
                    {showSetupGuide && <TeacherSetupModal onClose={() => setShowSetupGuide(false)} />}
                    {(!user) ? <LoginView setUser={setUser} setView={setView} setShowTutorial={setShowTutorial} adminPwd={adminPwd} setAdminPwd={setAdminPwd} showAlert={showAlert} showConfirm={showConfirm} setShowSetupGuide={setShowSetupGuide} mainTitle={mainTitle} /> :
                     (view === 'admin') ? <AdminView boards={boards} responses={responses} saveBoard={saveBoard} saveResponse={saveResponse} deleteBoard={deleteBoard} setView={setView} setCurrentBoard={setCurrentBoard} setUser={setUser} adminPwd={adminPwd} setAdminPwd={setAdminPwd} geminiKey={geminiKey} setGeminiKey={setGeminiKey} tutorialData={tutorialData} saveTutorial={saveTutorial} showAlert={showAlert} showConfirm={showConfirm} gasUrl={gasUrl} setGasUrl={setGasUrl} setShowSetupGuide={setShowSetupGuide} isCloudConnected={isCloudConnected} lastSyncTime={lastSyncTime} uploadLocalToCloud={uploadLocalToCloud} hasLocalDataToUpload={hasLocalDataToUpload} mainTitle={mainTitle} setMainTitle={setMainTitle} saveSetting={saveSetting} showLoader={showLoader} hideLoader={hideLoader} /> :
                     (view === 'dashboard') ? <DashboardView user={user} boards={boards} setCurrentBoard={setCurrentBoard} setView={setView} setShowTutorial={setShowTutorial} setUser={setUser} setMagicUnlocked={setMagicUnlocked} isCloudConnected={isCloudConnected} lastSyncTime={lastSyncTime} mainTitle={mainTitle} /> :
                     (view === 'board' && currentBoard) ? <BoardView user={user} currentBoard={currentBoard} responses={responses} setView={setView} setCurrentBoard={setCurrentBoard} magicUnlocked={magicUnlocked} setMagicUnlocked={setMagicUnlocked} adminPwd={adminPwd} setEditingTargetId={setEditingTargetId} showAlert={showAlert} showPrompt={showPrompt} saveResponse={saveResponse} deleteResponse={deleteResponse} showConfirm={showConfirm} isCloudConnected={isCloudConnected} lastSyncTime={lastSyncTime} showLoader={showLoader} hideLoader={hideLoader} /> :
                     (view === 'form' && currentBoard) ? <FormView user={user} currentBoard={currentBoard} responses={responses} setView={setView} saveResponse={saveResponse} geminiKey={geminiKey} editingTargetId={editingTargetId} setShowTutorial={setShowTutorial} showAlert={showAlert} showLoader={showLoader} hideLoader={hideLoader} /> :
                     <LoginView setUser={setUser} setView={setView} setShowTutorial={setShowTutorial} adminPwd={adminPwd} setAdminPwd={setAdminPwd} showAlert={showAlert} showConfirm={showConfirm} setShowSetupGuide={setShowSetupGuide} mainTitle={mainTitle} />}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
